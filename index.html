<script>
// --- CORE DATA MODEL ---
let txns = [];

// 1. Data Sanitizer: The "Iron Curtain"
// This ensures data is always usable before the app sees it.
function syncDataFromStorage() {
    try {
        const raw = localStorage.getItem('spendly_txns');
        const parsed = raw ? JSON.parse(raw) : [];
        
        // Filter: Keep only objects that have a valid number for 'amount'
        txns = Array.isArray(parsed) ? parsed.filter(t => t && typeof t.amount === 'number') : [];
    } catch (e) {
        console.error("Critical storage error. Resetting...");
        txns = [];
    }
}

// 2. Safe Rendering Logic
function renderList(listId, dataArray) {
    const list = document.getElementById(listId);
    if (!list) return;
    list.innerHTML = '';
    
    dataArray.forEach(t => {
        // Double-verification before display
        const amt = typeof t.amount === 'number' ? t.amount : 0;
        
        const div = document.createElement('div');
        div.className = 'tx-item';
        div.innerHTML = `
            <div class="tx-body">
                <div class="tx-name">${t.desc || 'Untitled'}</div>
            </div>
            <div class="tx-right">
                <div class="tx-amt ${t.type}">${t.type === 'income' ? '+' : '-'}$${amt.toFixed(2)}</div>
            </div>
        `;
        list.appendChild(div);
    });
}

// 3. Robust Data Submission
function addTx(type, amount, desc) {
    const safeAmount = parseFloat(amount);
    if (isNaN(safeAmount)) return;
    
    const newTx = {
        id: Date.now(),
        type: type,
        amount: safeAmount,
        desc: desc || 'Transaction',
        date: new Date().toISOString()
    };
    
    txns.unshift(newTx);
    localStorage.setItem('spendly_txns', JSON.stringify(txns));
    syncDataFromStorage(); // Refresh memory
    renderAll();
}

// Global refresh
function renderAll() {
    renderList('txList', txns);
}

// Initialize
syncDataFromStorage();
renderAll();
</script>
