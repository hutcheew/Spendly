<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spendly Pro</title>
    <style>
        body { background: #070710; color: #fff; font-family: sans-serif; padding: 20px; }
        .tx-item { background: #161628; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .inc { color: #22d3a0; }
        .exp { color: #f25c7a; }
        input { background: #1e1e35; color: white; border: 1px solid #2d2d50; padding: 10px; width: 100%; margin-bottom: 10px; border-radius: 8px; }
        button { background: #7c6aff; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Spendly Pro</h2>
    <input type="number" id="inAmt" placeholder="Amount">
    <input type="text" id="inDesc" placeholder="Description">
    <button onclick="saveTx()">Save Transaction</button>
    
    <div id="txList" style="margin-top:20px;"></div>

    <script>
        let txns = [];

        // 1. Load and Repair
        function init() {
            const raw = localStorage.getItem('spendly_txns');
            try {
                txns = raw ? JSON.parse(raw) : [];
                if (!Array.isArray(txns)) txns = [];
            } catch (e) {
                txns = [];
            }
            render();
        }

        // 2. Safe Render
        function render() {
            const list = document.getElementById('txList');
            list.innerHTML = '';
            txns.forEach(t => {
                const amount = Number(t.amount) || 0;
                const div = document.createElement('div');
                div.className = 'tx-item';
                div.innerHTML = `<div>${t.desc || 'No Name'}</div>
                                 <div class="${t.type}">${amount.toFixed(2)}</div>`;
                list.appendChild(div);
            });
            console.log("Rendered", txns.length, "transactions");
        }

        // 3. Save and Sync
        function saveTx() {
            const amount = parseFloat(document.getElementById('inAmt').value);
            const desc = document.getElementById('inDesc').value;
            
            if(isNaN(amount)) return alert("Invalid Amount");

            const newTx = { id: Date.now(), amount, desc, type: 'exp', date: new Date().toISOString() };
            txns.unshift(newTx);
            localStorage.setItem('spendly_txns', JSON.stringify(txns));
            
            render();
            attemptSync(newTx); // Try to send to Sheet
        }

        function attemptSync(txn) {
            const url = localStorage.getItem('spendly_sheet_url');
            if(!url) {
                console.log("No Sync URL set. Skipping sync.");
                return;
            }
            
            fetch(url, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(txn)
            }).then(() => console.log("Sync request sent"))
              .catch(err => console.error("Sync failed:", err));
        }

        window.onload = init;
    </script>
</body>
</html>
