<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spendly Pro</title>
    <style>
        body { background: #070710; color: #f0f0fa; font-family: sans-serif; max-width: 430px; margin: 0 auto; padding: 20px; }
        .tx-item { background: #161628; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2d2d50; }
        .tx-amt.inc { color: #22d3a0; }
        .tx-amt.exp { color: #f25c7a; }
        button { padding: 12px; cursor: pointer; background: #7c6aff; color: white; border: none; border-radius: 8px; width: 100%; margin-top: 10px; font-weight: bold; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #2d2d50; background: #161628; color: white; }
    </style>
</head>
<body>

    <h2>Spendly Ledger</h2>
    
    <div id="formSection">
        <input type="number" id="inAmt" placeholder="Amount (e.g. 50.00)">
        <input type="text" id="inDesc" placeholder="Description">
        <select id="inType" style="width:100%; padding:10px; margin-bottom:10px;">
            <option value="expense">Expense</option>
            <option value="income">Income</option>
        </select>
        <button onclick="saveTransaction()">Add Transaction</button>
    </div>

    <div id="txList" style="margin-top: 20px;"></div>
    <button onclick="purgeData()" style="background:#f25c7a">Purge All Data</button>

<script>
    let txns = [];

    function init() {
        const stored = localStorage.getItem('spendly_txns');
        txns = stored ? JSON.parse(stored) : [];
        render();
    }

    function saveTransaction() {
        const amount = parseFloat(document.getElementById('inAmt').value);
        const desc = document.getElementById('inDesc').value || "No description";
        const type = document.getElementById('inType').value;

        if (isNaN(amount)) { alert("Enter a valid amount"); return; }

        txns.unshift({ id: Date.now(), amount, desc, type, date: new Date().toISOString() });
        localStorage.setItem('spendly_txns', JSON.stringify(txns));
        render();
    }

    function render() {
        const list = document.getElementById('txList');
        list.innerHTML = '';
        
        txns.forEach(t => {
            // THE SAFETY NET: Coerce to number, fallback to 0
            const val = Number(t.amount) || 0;
            
            const div = document.createElement('div');
            div.className = 'tx-item';
            div.innerHTML = `
                <div><strong>${t.desc}</strong></div>
                <div class="tx-amt ${t.type}">${t.type === 'income' ? '+' : '-'}$${val.toFixed(2)}</div>
            `;
            list.appendChild(div);
        });
    }

    function purgeData() {
        if(confirm("Delete all data?")) {
            localStorage.clear();
            txns = [];
            render();
        }
    }

    window.onload = init;
</script>
</body>
</html>
