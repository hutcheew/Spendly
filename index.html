<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Spendly Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#070710;--s1:#0f0f1e;--s2:#161628;--s3:#1e1e35;--s4:#26263f;
  --border:#2d2d50;--border2:#3a3a60;
  --text:#f0f0fa;--text2:#a8a8c8;--text3:#6060a0;
  --income:#22d3a0;--expense:#f25c7a;--accent:#7c6aff;--accent2:#b06aff;
  --warn:#f59e0b;--info:#38bdf8;
  --card-r:18px;--sheet-r:28px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:100%;overscroll-behavior:none;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;max-width:430px;margin:0 auto;min-height:100vh;overflow-x:hidden;padding-bottom:calc(88px + var(--safe-bottom));}

/* ── NOISE TEXTURE OVERLAY ── */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.5;}

/* ── HEADER ── */
.hdr{padding:16px 18px 10px;position:sticky;top:0;z-index:40;background:linear-gradient(to bottom,var(--bg) 70%,transparent);backdrop-filter:blur(12px);}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.logo{font-family:'Instrument Serif',serif;font-size:24px;letter-spacing:-.5px;display:flex;align-items:center;gap:6px;}
.logo-dot{width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));flex-shrink:0;}
.hdr-actions{display:flex;gap:8px;align-items:center;}
.month-nav{display:flex;align-items:center;gap:6px;}
.month-nav button{background:var(--s3);border:1px solid var(--border);color:var(--text2);width:30px;height:30px;border-radius:10px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.month-nav button:hover{border-color:var(--accent);color:var(--text);}
.month-nav span{font-size:13px;font-weight:500;min-width:76px;text-align:center;}
.icon-btn{background:var(--s3);border:1px solid var(--border);color:var(--text2);width:32px;height:32px;border-radius:10px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s;position:relative;}
.icon-btn:hover{border-color:var(--accent);color:var(--text);}
.icon-btn .badge{position:absolute;top:-4px;right:-4px;background:var(--expense);color:#fff;font-size:9px;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg);}

.tabs{display:flex;background:var(--s2);border-radius:12px;padding:3px;gap:3px;}
.tab{flex:1;padding:7px 4px;border:none;border-radius:9px;background:none;color:var(--text3);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;letter-spacing:.2px;}
.tab.active{background:var(--s4);color:var(--text);}

/* ── HERO BALANCE CARD ── */
.hero{margin:4px 18px 0;background:linear-gradient(145deg,var(--s2),var(--s3));border:1px solid var(--border);border-radius:var(--card-r);padding:20px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 90% 10%,rgba(124,106,255,.12),transparent);pointer-events:none;}
.hero-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:2px;color:var(--text3);margin-bottom:6px;}
.hero-amount{font-family:'Instrument Serif',serif;font-size:48px;letter-spacing:-2px;line-height:1;margin-bottom:4px;}
.hero-amount.pos{color:var(--income);}
.hero-amount.neg{color:var(--expense);}
.hero-sub{font-size:12px;color:var(--text3);}
.hero-split{display:flex;gap:12px;margin-top:16px;}
.hero-stat{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:10px 12px;}
.hero-stat-label{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:4px;}
.hero-stat-val{font-size:18px;font-weight:600;letter-spacing:-.5px;}
.hero-stat-val.inc{color:var(--income);}
.hero-stat-val.exp{color:var(--expense);}
.hero-bar{height:3px;background:var(--s4);border-radius:99px;margin-top:12px;overflow:hidden;display:flex;}
.hero-bar-inc{background:var(--income);transition:width .8s cubic-bezier(.4,0,.2,1);}
.hero-bar-exp{background:var(--expense);transition:width .8s cubic-bezier(.4,0,.2,1);}

/* ── BUDGET ALERT BAR ── */
.budget-alerts{margin:10px 18px 0;display:flex;flex-direction:column;gap:6px;}
.budget-alert{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px;animation:slideIn .3s ease;}
.budget-alert.warn{border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.05);}
.budget-alert.over{border-color:rgba(242,92,122,.3);background:rgba(242,92,122,.05);}
.ba-emoji{font-size:16px;flex-shrink:0;}
.ba-info{flex:1;min-width:0;}
.ba-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ba-sub{font-size:10px;color:var(--text3);margin-top:1px;}
.ba-pct{font-size:12px;font-weight:700;}
.ba-pct.warn{color:var(--warn);}
.ba-pct.over{color:var(--expense);}

/* ── CATEGORY CHIPS ── */
.cat-scroll{padding:10px 18px 0;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;}
.cat-scroll::-webkit-scrollbar{display:none;}
.chip{background:var(--s2);border:1px solid var(--border);color:var(--text3);border-radius:99px;padding:5px 12px;font-size:11px;font-weight:500;white-space:nowrap;cursor:pointer;transition:all .2s;flex-shrink:0;}
.chip.active{border-color:var(--accent);color:var(--accent);background:rgba(124,106,255,.1);}

/* ── TX LIST SWIPE WRAPPERS ── */
.list-sec{padding:14px 18px 0;}
.sec-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(--text3);margin-bottom:10px;}
.tx-list{display:flex;flex-direction:column;gap:6px;}

/* Container hosting swipe background and the moving front card */
.tx-swipe-container {
  position: relative;
  overflow: hidden;
  border-radius: 14px;
}
.tx-item {
  background:var(--s2);
  border:1px solid var(--border);
  border-radius:14px;
  padding:12px 14px;
  display:flex;
  align-items:center;
  gap:11px;
  cursor:pointer;
  position:relative;
  z-index: 2;
  transform: translateX(0);
  transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  animation:slideIn .3s ease both;
}
.tx-item:hover, .tx-item:active {
  background:var(--s3);
  border-color:var(--border2);
}
@keyframes slideIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.tx-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.tx-body{flex:1;min-width:0;}
.tx-name{font-weight:500;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tx-meta{font-size:11px;color:var(--text3);margin-top:2px;}
.tx-right{flex-shrink:0;text-align:right;}
.tx-amt{font-family:'Instrument Serif',serif;font-size:17px;letter-spacing:-.3px;}
.tx-amt.inc{color:var(--income);}
.tx-amt.exp{color:var(--expense);}
.tx-badge{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:2px 6px;border-radius:99px;margin-top:3px;display:inline-block;}
.tx-badge.inc{background:rgba(34,211,160,.12);color:var(--income);}
.tx-badge.exp{background:rgba(242,92,122,.12);color:var(--expense);}

/* Swipe delete base deck */
.tx-delete-bg {
  position:absolute;
  right:0;
  top:0;
  bottom:0;
  width:80px;
  background:var(--expense);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  border-radius:0 14px 14px 0;
  z-index: 1;
}

.empty{text-align:center;padding:48px 20px;color:var(--text3);}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.5;}
.empty p{font-size:13px;line-height:1.8;}

/* ── ANALYTICS ── */
.analytics-sec{padding:14px 18px 0;}
.analytics-row{display:flex;gap:10px;margin-bottom:10px;}
.acard{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:var(--card-r);padding:14px;}
.acard-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:6px;}
.acard-val{font-family:'Instrument Serif',serif;font-size:22px;letter-spacing:-.5px;}
.acard-sub{font-size:11px;color:var(--text3);margin-top:3px;}
.trend-up{color:var(--expense);}
.trend-down{color:var(--income);}
.trend-same{color:var(--text3);}

/* Sparkline */
.sparkline-wrap{height:48px;display:flex;align-items:flex-end;gap:3px;margin-top:10px;}
.spark-bar{flex:1;border-radius:4px 4px 0 0;min-height:3px;transition:height .5s ease;cursor:pointer;}
.spark-bar:hover{opacity:.8;}

/* Pie chart */
.pie-section{margin-bottom:14px;}
.pie-wrap{display:flex;align-items:center;gap:16px;}
.pie-legend{flex:1;display:flex;flex-direction:column;gap:6px;}
.leg-row{display:flex;align-items:center;gap:8px;}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.leg-name{font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.leg-val{font-size:11px;color:var(--text3);}

/* Bar chart */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.bar-lbl{font-size:11px;color:var(--text2);width:78px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-track{flex:1;background:var(--s3);border-radius:99px;height:6px;overflow:hidden;}
.bar-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.bar-val{font-size:11px;color:var(--text3);width:52px;text-align:right;flex-shrink:0;}

/* ── BUDGET GOALS ── */
.budget-sec{padding:14px 18px 0;}
.budget-card{background:var(--s2);border:1px solid var(--border);border-radius:var(--card-r);padding:14px;margin-bottom:8px;}
.budget-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.budget-icon{font-size:20px;}
.budget-title{flex:1;font-weight:500;font-size:14px;}
.budget-pct{font-size:12px;font-weight:600;}
.budget-track{height:6px;background:var(--s4);border-radius:99px;overflow:hidden;}
.budget-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.budget-amounts{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--text3);}

/* ── FABs ── */
.fab-wrap{position:fixed;bottom:calc(24px + var(--safe-bottom));left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:100;}
.fab{border:none;border-radius:99px;padding:14px 22px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:transform .15s,box-shadow .15s;backdrop-filter:blur(8px);}
.fab:active{transform:scale(.95);}
.fab-exp{background:rgba(242,92,122,.15);color:var(--expense);border:1px solid rgba(242,92,122,.3);}
.fab-inc{background:rgba(34,211,160,.15);color:var(--income);border:1px solid rgba(34,211,160,.3);}
.fab-exp:hover{background:rgba(242,92,122,.25);box-shadow:0 8px 32px rgba(242,92,122,.2);}
.fab-inc:hover{background:rgba(34,211,160,.25);box-shadow:0 8px 32px rgba(34,211,160,.2);}

/* ── OVERLAY / SHEET ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s;}
.overlay.open{opacity:1;pointer-events:all;}
.sheet{background:var(--s1);border-radius:var(--sheet-r) var(--sheet-r) 0 0;padding:22px 18px calc(28px + var(--safe-bottom));width:100%;max-width:430px;margin:0 auto;transform:translateY(28px);transition:transform .3s cubic-bezier(.4,0,.2,1);border-top:1px solid var(--border);max-height:92vh;overflow-y:auto;}
.overlay.open .sheet{transform:translateY(0);}
.handle{width:36px;height:4px;background:var(--border2);border-radius:99px;margin:0 auto 20px;}
.sheet h2{font-family:'Instrument Serif',serif;font-size:22px;letter-spacing:-.3px;margin-bottom:18px;}

/* Form elements */
.fg{margin-bottom:12px;}
.fg label{display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:6px;}
.fg input,.fg select,.fg textarea{width:100%;background:var(--s2);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:12px 14px;font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color .15s;font-weight:400;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent);}
.fg select option{background:var(--s2);}
.fg small{display:block;margin-top:5px;font-size:11px;color:var(--text3);line-height:1.5;}
.fg textarea{resize:none;height:80px;}

/* Type toggle */
.type-toggle{display:flex;gap:8px;margin-bottom:14px;}
.type-btn{flex:1;padding:11px;border-radius:12px;border:1px solid var(--border);background:var(--s2);color:var(--text3);font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:all .2s;}
.type-btn.exp.active{border-color:var(--expense);color:var(--expense);background:rgba(242,92,122,.1);}
.type-btn.inc.active{border-color:var(--income);color:var(--income);background:rgba(34,211,160,.1);}

/* Cat grid */
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.cat-opt{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:10px 5px;text-align:center;cursor:pointer;transition:all .15s;font-size:10px;font-weight:600;color:var(--text3);}
.cat-opt .ce{font-size:19px;display:block;margin-bottom:4px;}
.cat-opt.selected{border-color:var(--accent);color:var(--accent);background:rgba(124,106,255,.08);}

/* Buttons */
.btn-primary{width:100%;border:none;border-radius:13px;padding:15px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:16px;cursor:pointer;margin-top:16px;transition:opacity .15s;}
.btn-primary.exp-btn{background:var(--expense);color:#fff;}
.btn-primary.inc-btn{background:var(--income);color:#060a0a;}
.btn-primary.acc-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.btn-primary:hover{opacity:.88;}
.btn-secondary{width:100%;background:var(--s2);color:var(--text);border:1px solid var(--border);border-radius:13px;padding:13px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;cursor:pointer;margin-top:9px;transition:all .15s;}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
.btn-danger{width:100%;background:transparent;color:var(--expense);border:1px solid rgba(242,92,122,.3);border-radius:13px;padding:13px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;cursor:pointer;margin-top:9px;transition:all .15s;}
.btn-danger:hover{background:rgba(242,92,122,.1);}

/* Settings menu overlay layout layers fix */
.menu-ov{position:fixed;inset:0;z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s;}
.menu-ov.open{opacity:1;pointer-events:all;}
.menu-back{position:absolute;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);}
.menu-sheet{position:absolute;bottom:0;left:50%;transform:translateX(-50%) translateY(20px);width:100%;max-width:430px;background:var(--s1);border-radius:var(--sheet-r) var(--sheet-r) 0 0;padding:22px 18px calc(32px + var(--safe-bottom));border-top:1px solid var(--border);transition:transform .3s cubic-bezier(.4,0,.2,1);}
.menu-ov.open .menu-sheet{transform:translateX(-50%) translateY(0);}
.menu-item{display:flex;align-items:center;gap:13px;padding:13px 14px;border-radius:12px;cursor:pointer;transition:background .15s;margin-bottom:2px;}
.menu-item:hover{background:var(--s2);}
.mi-icon{font-size:18px;width:28px;text-align:center;}
.mi-label{font-weight:500;font-size:14px;}
.mi-desc{font-size:11px;color:var(--text3);margin-top:1px;}
.menu-div{height:1px;background:var(--border);margin:6px 0;}

/* Sync dot */
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .3s;}
.sync-dot.on{background:var(--income);}
.sync-dot.syncing{background:var(--accent);animation:pulse 1s infinite;}
.sync-dot.err{background:var(--expense);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.2;}}

/* Sync bar */
.sync-bar{margin:8px 18px 0;background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px;}
.sync-bar.on{border-color:rgba(34,211,160,.25);background:rgba(34,211,160,.04);}
.sync-bar.err{border-color:rgba(242,92,122,.25);}
.sync-info{flex:1;}
.sync-title{font-size:12px;font-weight:500;}
.sync-sub{font-size:10px;color:var(--text3);margin-top:1px;}
.sync-btn{background:var(--s3);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:5px 10px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;}
.sync-btn:hover{border-color:var(--accent);color:var(--accent);}

/* Emoji/color pickers */
.emoji-picker{display:flex;flex-wrap:wrap;gap:7px;margin-top:7px;}
.ep{width:36px;height:36px;border-radius:10px;background:var(--s2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all .15s;}
.ep.selected{border-color:var(--accent);background:rgba(124,106,255,.12);}
.color-picker{display:flex;flex-wrap:wrap;gap:7px;margin-top:7px;}
.cp{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;}
.cp.selected{border-color:#fff;transform:scale(1.2);}

/* Cat list items */
.ccat-item{display:flex;align-items:center;gap:9px;padding:10px 13px;background:var(--s2);border-radius:11px;margin-bottom:7px;border:1px solid var(--border);}
.ccat-item .ci{font-size:18px;}
.ccat-item .cn{flex:1;font-weight:500;font-size:13px;}
.ccat-item .cd{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;transition:color .15s;}
.ccat-item .cd:hover{color:var(--expense);}

/* Drop zone */
.drop-zone{border:2px dashed var(--border);border-radius:13px;padding:28px 16px;text-align:center;cursor:pointer;transition:all .2s;color:var(--text3);font-size:12px;font-weight:600;}
.drop-zone:hover,.drop-zone.dg{border-color:var(--accent);color:var(--accent);}
.dz-icon{font-size:30px;margin-bottom:9px;}
input[type="file"]{display:none;}

/* Toast */
.toast{position:fixed;bottom:calc(108px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(16px);background:var(--s3);border:1px solid var(--border);color:var(--text);border-radius:99px;padding:10px 20px;font-size:12px;font-weight:500;opacity:0;transition:all .3s;z-index:600;white-space:nowrap;max-width:320px;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:rgba(34,211,160,.5);color:var(--income);}
.toast.err{border-color:rgba(242,92,122,.5);color:var(--expense);}
.toast.info{border-color:rgba(124,106,255,.5);color:var(--accent);}

/* Offline banner */
.offline-banner{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:10px;padding:8px 14px;margin:8px 18px 0;font-size:12px;color:var(--warn);display:none;align-items:center;gap:8px;}
.offline-banner.show{display:flex;}
</style>
</head>
<body>

<div class="offline-banner" id="offlineBanner">⚡ Offline — changes will sync when you reconnect</div>

<div class="hdr">
  <div class="hdr-top">
    <div class="logo"><div class="logo-dot"></div>Spendly</div>
    <div class="hdr-actions">
      <div class="month-nav">
        <button id="prevMonth">&#8249;</button>
        <span id="monthLabel"></span>
        <button id="nextMonth">&#8250;</button>
      </div>
      <button class="icon-btn" id="syncIconBtn" onclick="doSync()" title="Sync">&#8635;<div class="sync-dot" id="syncDot"></div></button>
      <button class="icon-btn" onclick="openMenu()">&#9881;&#65039;</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchView('overview')">Overview</button>
    <button class="tab" onclick="switchView('transactions')">Transactions</button>
    <button class="tab" onclick="switchView('analytics')">Analytics</button>
    <button class="tab" onclick="switchView('budget')">Budget</button>
  </div>
</div>

<div class="hero">
  <div class="hero-label">Net balance this month</div>
  <div class="hero-amount" id="heroAmount">$0.00</div>
  <div class="hero-sub" id="heroSub">Loading...</div>
  <div class="hero-split">
    <div class="hero-stat">
      <div class="hero-stat-label">Income</div>
      <div class="hero-stat-val inc" id="totalIncome">$0</div>
    </div>
    <div class="hero-stat">
      <div class="hero-stat-label">Expenses</div>
      <div class="hero-stat-val exp" id="totalExpense">$0</div>
    </div>
    <div class="hero-stat">
      <div class="hero-stat-label">Daily avg</div>
      <div class="hero-stat-val" id="dailyAvg" style="color:var(--text2)">$0</div>
    </div>
  </div>
  <div class="hero-bar">
    <div class="hero-bar-inc" id="heroBarInc" style="width:50%"></div>
    <div class="hero-bar-exp" id="heroBarExp" style="width:50%"></div>
  </div>
</div>

<div class="cat-scroll" id="catScroll"></div>

<div id="view-overview">
  <div class="list-sec">
    <div class="sec-lbl">Recent activity</div>
    <div class="tx-list" id="overviewList"></div>
  </div>
</div>

<div id="view-transactions" style="display:none">
  <div class="list-sec">
    <div class="sec-lbl" id="txSecLabel">All transactions</div>
    <div class="tx-list" id="txList"></div>
  </div>
</div>

<div id="view-budget" style="display:none">
  <div class="budget-sec">
    <div id="budgetList"></div>
    <button class="btn-primary acc-btn" style="margin-top:4px" onclick="openOv('newBudgetOv')">+ Set Budget Goal</button>
  </div>
</div>

<div class="fab-wrap">
  <button class="fab fab-exp" onclick="openTxModal('expense')">&#8722; Expense</button>
  <button class="fab fab-inc" onclick="openTxModal('income')">&#43; Income</button>
</div>
<div class="toast" id="toast"></div>

<div class="menu-ov" id="menuOv">
  <div class="menu-back" onclick="closeMenu()"></div>
  <div class="menu-sheet">
    <div class="handle"></div>
    <h2>Settings</h2>
    <div class="menu-item">
      <span class="mi-icon">📊</span>
      <div class="sync-info">
        <div class="mi-label">Google Sheets Sync Link</div>
        <div class="mi-desc">Configure your remote automation URL</div>
      </div>
    </div>
  </div>
</div>

<script>
// Global mock states
let txns = [];
window.budgets = [
  { category: 'food', limit: 400 },
  { category: 'transport', limit: 150 },
  { category: 'shopping', limit: 300 }
];
window.categories = [
  { id: 'food', name: 'Groceries', emoji: '🛒' },
  { id: 'transport', name: 'Transport', emoji: '🚗' },
  { id: 'shopping', name: 'Shopping', emoji: '🛍️' },
  { id: 'salary', name: 'Salary', emoji: '💼' }
];
let currentMonth = new Date();

// Touch gesture tracking states for swipe handling
let touchStartX = 0;
let touchStartY = 0;
let activeSwipeItem = null;
let currentTranslateX = 0;
const SWIPE_THRESHOLD = 80;

function init() {
  const y = currentMonth.getFullYear();
  const m = String(currentMonth.getMonth() + 1).padStart(2, '0');
  
  txns = [
    {id:'i1',type:'income',amount:7200,desc:'Monthly salary',cat:'salary',date:`${y}-${m}-01`},
    {id:'e1',type:'expense',amount:142.50,desc:'Woolworths weekly shop',cat:'food',date:`${y}-${m}-02`},
    {id:'e2',type:'expense',amount:54.80,desc:'Myki top-up',cat:'transport',date:`${y}-${m}-03`},
    {id:'e3',type:'expense',amount:189.99,desc:'Running shoes',cat:'shopping',date:`${y}-${m}-04`}
  ];
  
  document.getElementById('monthLabel').innerText = currentMonth.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  renderOverview();
  renderBudgets();
}

function switchView(view) {
  ['overview', 'transactions', 'budget'].forEach(v => {
    const el = document.getElementById(`view-${v}`);
    if (el) el.style.display = 'none';
  });
  
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const targetView = document.getElementById(`view-${view}`);
  if (targetView) targetView.style.display = 'block';
  
  if (event) event.currentTarget.classList.add('active');

  if (view === 'budget') {
    renderBudgets();
  }
}

function renderOverview() {
  const container = document.getElementById('overviewList');
  if (!container) return;
  container.innerHTML = '';

  txns.forEach(t => {
    const catMeta = window.categories.find(c => c.id === t.cat);
    const emoji = catMeta ? catMeta.emoji : '💰';
    
    // Swipe list wrapping assembly structures
    const wrapper = document.createElement('div');
    wrapper.className = 'tx-swipe-container';
    
    wrapper.innerHTML = `
      <div class="tx-delete-bg">🗑️</div>
      <div class="tx-item" data-id="${t.id}">
        <div class="tx-icon" style="background:var(--s3)">${emoji}</div>
        <div class="tx-body">
          <div class="tx-name">${t.desc}</div>
          <div class="tx-meta">${t.date}</div>
        </div>
        <div class="tx-right">
          <div class="tx-amt ${t.type === 'income' ? 'inc' : 'exp'}">
            ${t.type === 'income' ? '+' : '-'}$${t.amount.toFixed(2)}
          </div>
        </div>
      </div>
    `;
    
    const itemCard = wrapper.querySelector('.tx-item');
    attachSwipeListeners(itemCard, t.id);
    
    container.appendChild(wrapper);
  });
}

function renderBudgets() {
  const container = document.getElementById("budgetList");
  if (!container) return;
  container.innerHTML = "";

  const activeBudgets = window.budgets || [];

  if (activeBudgets.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🎯</div>
        <p>No budget goals configured.<br>Tap the button below to establish your limits.</p>
      </div>`;
    return;
  }

  const currentMonthTx = txns.filter(t => {
    if (t.type !== 'expense') return false;
    const d = new Date(t.date);
    return d.getMonth() === currentMonth.getMonth() && d.getFullYear() === currentMonth.getFullYear();
  });

  activeBudgets.forEach(b => {
    const spent = currentMonthTx
      .filter(t => t.cat === b.category)
      .reduce((sum, t) => sum + t.amount, 0);

    const pct = b.limit > 0 ? Math.min(Math.round((spent / b.limit) * 100), 100) : 0;
    const rawPct = b.limit > 0 ? (spent / b.limit) * 100 : 0;
    
    let fillColor = "var(--accent)";
    if (rawPct >= 100) fillColor = "var(--expense)";
    else if (rawPct >= 85) fillColor = "var(--warn)";

    const catMeta = window.categories ? window.categories.find(c => c.id === b.category) : null;
    const emoji = catMeta ? catMeta.emoji : "💰";
    const label = catMeta ? catMeta.name : b.category.charAt(0).toUpperCase() + b.category.slice(1);

    const card = document.createElement("div");
    card.className = "budget-card";
    card.innerHTML = `
      <div class="budget-header">
        <div class="budget-icon">${emoji}</div>
        <div class="budget-title">${label}</div>
        <div class="budget-pct" style="color: ${fillColor}">${pct}%</div>
      </div>
      <div class="budget-track">
        <div class="budget-fill" style="width: ${pct}%; background: ${fillColor}"></div>
      </div>
      <div class="budget-amounts">
        <span>$${spent.toFixed(2)} spent</span>
        <span>of $${b.limit.toFixed(2)}</span>
      </div>
    `;
    container.appendChild(card);
  });
}

/* Swipe interaction touch controllers rulesets */
function attachSwipeListeners(element, txnId) {
  element.addEventListener('touchstart', (e) => {
    // Reset previous open elements if any exist
    if (activeSwipeItem && activeSwipeItem !== element) {
      activeSwipeItem.style.transform = 'translateX(0px)';
    }
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    element.style.transition = 'none';
  }, { passive: true });

  element.addEventListener('touchmove', (e) => {
    const currentX = e.touches[0].clientX;
    const currentY = e.touches[0].clientY;
    const diffX = currentX - touchStartX;
    const diffY = currentY - touchStartY;
    
    // Lock scrolling if the intent is predominantly a horizontal swipe gesture
    if (Math.abs(diffX) > Math.abs(diffY)) {
      if (diffX < 0) { // Swiping leftward
        currentTranslateX = Math.max(diffX, -120);
        element.style.transform = `translateX(${currentTranslateX}px)`;
      }
    }
  }, { passive: true });

  element.addEventListener('touchend', () => {
    element.style.transition = 'transform 0.2s cubic-bezier(0.4, 0, 0.2, 1)';
    if (currentTranslateX <= -SWIPE_THRESHOLD) {
      // Complete slide open deck threshold matched
      element.style.transform = 'translateX(-80px)';
      activeSwipeItem = element;
      
      // Prompt quick execution delete confirmation hook
      setTimeout(() => {
        if (confirm("Delete this transaction?")) {
          txns = txns.filter(t => t.id !== txnId);
          renderOverview();
          renderBudgets();
          showToast("Transaction removed successfully", "ok");
        } else {
          element.style.transform = 'translateX(0px)';
          activeSwipeItem = null;
        }
      }, 150);
    } else {
      element.style.transform = 'translateX(0px)';
      activeSwipeItem = null;
    }
    currentTranslateX = 0;
  });
}

function openMenu() { document.getElementById('menuOv').classList.add('open'); }
function closeMenu() { document.getElementById('menuOv').classList.remove('open'); }

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

window.onload = init;
</script>
</body>
</html>
